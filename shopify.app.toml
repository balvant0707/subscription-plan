# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "05ea4db8f0ee284f1aaf4b5ce1ce257a"
name = "Subscription Plan"
application_url = "https://subscription-plan-alpha.vercel.app"
embedded = true

[build]
automatically_update_urls_on_dev = true


[webhooks]
api_version = "2026-07"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_products,write_products,read_customers,write_customers,read_orders,write_orders,read_checkouts,write_checkouts,read_inventory,write_inventory,read_discounts,write_discounts,read_script_tags,write_script_tags,read_themes,write_themes,read_merchant_managed_fulfillment_orders,write_merchant_managed_fulfillment_orders,read_payment_terms,write_payment_terms"

[auth]
redirect_urls = [
  "https://subscription-plan-alpha.vercel.app/auth/callback",
  "https://subscription-plan-alpha.vercel.app/shopify/callback",
  "https://subscription-plan-alpha.vercel.app/api/auth/callback"
]

[app_proxy]
url = "https://subscription-plan-alpha.vercel.app/apps/subscription-plan"
subpath = "subscription-plan"
prefix = "apps"
